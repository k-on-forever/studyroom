# 开发环境：异常返回中可带简要技术信息（仅本机 / 内网使用）
study:
  exception:
    expose-detail: true

spring:
    datasource:
        type: com.alibaba.druid.pool.DruidDataSource
        druid:
            driver-class-name: com.mysql.cj.jdbc.Driver
            # connectTimeout/socketTimeout：毫秒，避免连不上库时卡很久才报错
            url: ${SPRING_DATASOURCE_URL:jdbc:mysql://192.168.238.138:3306/study-room?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&connectTimeout=15000&socketTimeout=60000}
            username: ${SPRING_DATASOURCE_USERNAME:root}
            password: ${SPRING_DATASOURCE_PASSWORD:1234}
            initial-size: 10
            max-active: 100
            min-idle: 10
            max-wait: 60000
            pool-prepared-statements: true
            max-pool-prepared-statement-per-connection-size: 20
            time-between-eviction-runs-millis: 60000
            min-evictable-idle-time-millis: 300000
            #Oracle需要打开注释
            #validation-query: SELECT 1 FROM DUAL
            test-while-idle: true
            test-on-borrow: false
            test-on-return: false
            stat-view-servlet:
                enabled: true
                url-pattern: /druid/*
                #login-username: admin
                #login-password: admin
            filter:
                stat:
                    log-slow-sql: true
                    slow-sql-millis: 1000
                    merge-sql: false
                wall:
                    config:
                        multi-statement-allow: true
